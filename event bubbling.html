<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    .container {
        background-color: bisque;
        padding: 34px;
        margin: 24px;

    }

    .childcontainer {

        background-color: rgb(188, 231, 109);
        padding: 14px;
        margin: 14px;

    }

    .child {
        padding: 20px;
        margin: 20px;
        background-color: aqua;
        border: 2px solid black;
    }
</style>

<body>
    <div class="container">
        <div class="childcontainer">
            <div class="child">
                I am a Child Container
            </div>
        </div>
    </div>
</body>

<script>
    document.querySelector(".child")
        .addEventListener("click", (e) => {
            e.stopPropagation()
            alert("child was Clicked")
        })

    document.querySelector(".childcontainer")
        .addEventListener("click", (e) => {
            e.stopPropagation()
            alert("Child Container was Clicked")
        })

    document.querySelector(".container")
        .addEventListener("click", () => {
            alert("Container was Clicked")
        })

    ///////////////////////////////////////////////////////////////

    function randomcolor() {
        let r = Math.floor(Math.random() * 233)
        let g = Math.floor(Math.random() * 244)
        let b = Math.floor(Math.random() * 156)

        return ` rgb(${r}, ${g}, ${b})`;
    }
    // set internal hum tab use krty he jab koi kam bar bar repeat karana ho

    let a = setInterval(() => {
        document.querySelector(".childcontainer").style.background = randomcolor();
    }, 1000);

    // set time out jab 1 kam krana ho kuch dair bad tab use krty h
    
    // setTimeout(() => {
    //     document.querySelector(".childcontainer").style.background = randomcolor();
    // }, 1000);






</script>

</html>
