<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>

  <style>
    .box {
      cursor: pointer;
      background: #ff6969;
    }

    button {
      margin: 5px;
      padding: 10px;
      background-color: aqua;
      border-radius: 4px;
    }
  </style>
  <body>
    <div class="box">
      <p class="p">Hey i am a box</p>
    </div>

    <button id="btn">Change Content</button>

    <!-- ////////////////////////////////////////////////////////////////// -->

    <!-- <B> Property Of Events 
        1) Mouse Event
        2) Keyboard Event
        3) Form & Input Events
    </B> -->

    <!-- This is Mouse Event 
       1) Click 2) dblclick 3) mousedown 4) mouseup 5) mouse enter 
       6) mouse leave 7)mouse over 8) mouse out 9) mouse move -->

    <button onclick="hello()">Click Me</button>

    <!-- ////////////////////////////////////////////////////////////////// -->

    <button ondblclick="dbl()">Double Click Me</button>

    <!-- ////////////////////////////////////////////////////////////////// -->

    <!-- mousedown Event
     mousedown event jaise hi mouse ka button dabaya jata hai, usi waqt chal jata hai. -->

    <button onmousedown=" hello()">On Mouse Down</button>

    <!-- ////////////////////////////////////////////////////////////////// -->

    <!-- mouseup Event
     mouseup event tab chalta hai jab user mouse ka button chhor (release) deta hai. -->

    <button onmouseup="hello()">Mouse Up Button</button>

    <!-- ////////////////////////////////////////////////////////////////// -->

    <!-- mouseenter Event
     mouseenter event tab chalta hai jab mouse pointer kisi element ke andar enter karta hai. -->

    <button onmouseenter="hello()">Hover Me</button>

    <!-- ////////////////////////////////////////////////////////////////// -->

    <!-- mouseleave Event
    mouseleave event tab chalta hai jab mouse pointer kisi element se bahar nikalta hai. -->

    <button onmouseleave="hello()">Mouse Leave</button>

    <!-- ////////////////////////////////////////////////////////////////// -->

    <!-- Mouse Over Event
       mouseover event tab chalta hai jab mouse pointer kisi element ya uske
       child element ke upar aata hai. -->

    <button onmouseover="hello()">I am Mouse Over</button>

    <!-- ////////////////////////////////////////////////////////////-->

    <!-- mouseout Event
       mouseout event tab chalta hai jab mouse pointer kisi element ya uske
       child element se bahar nikalta hai. -->

    <button onmouseout="hello()">Mouse Out</button>

    <!-- ///////////////////////////////////////////////////////////////-->

    <!-- mousemove Event 
       mousemove event tab chalta rehta hai jab mouse pointer kisi
       element ke upar move karta hai. -->

    <button onmousemove="hello()">Mouse Move</button>

    <!-- /////////////////////////////////////////////////////////////////////////-->
    <!-- ----------------------------------------------------------------------- -->

    <!-- Keyboard Event -->
    <!-- 1) Key Down 2) Key UP -->

    <!-- keydown event tab chalta he jab user koi key dabata he -->
    <button onkeydown="hello()">Key Down</button>
    <!-- //////////////////////////////////////////////////-->

    <!-- keyup tab kam krta he jab user key ko daba kr chor de -->
    <button onkeyup="hello()">Key Up</button>
    <!-- //////////////////////////////////////////////////////-->
    <!-- ------------------------------------------------------------- -->




    <!-- Form & Input Events -->
    <!-- 1) input , 2) change , 3) focus , 4) blur , 5) submit -->

    <!-- 1) input event tab chalta hai jab user input field ki value me koi
         bhi change karta hai (type, delete, paste, etc.) -->

    <input type="text" oninput="inp()" />
    <!-- ------------------------------------------------------------- -->

    <!-- 2) change event tab chalta hai jab input ki value change ho jaye aur user us change ko
            complete kar de (aksar field se bahar aane par). -->

      <input type="text" onchange="inp()" />

      <!-- ------------------------------------------------------------- -->

     <!-- 3)focus event tab chalta hai jab user kisi input field par click
     karta hai aur cursor us field ke andar aa jata hai. -->

     <input type="text" onfocus="inp()" id="focus" />

       <!-- ------------------------------------------------------------- -->

      <!-- 4)blur event tab chalta hai jab user input
       field se bahar aa jata hai ya focus remove ho jata hai. -->

       <input type="text" onblur="inp()" />

        <!-- ------------------------------------------------------------- -->

      <!-- 5)submit event tab chalta hai jab user form ko submit karta hai. -->

       <form onsubmit="sub()">
             
        <input type="text" required>
        <button>submit</button>

       </form>


   





    <script src="event.js"></script>
  </body>
</html>
